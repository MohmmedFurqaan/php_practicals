<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>form | Home Page</title>
    <style>
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }

        .form-container {
            background: white;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid #ddd;
        }

        .form-title {
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .required::after {
            content: " *";
            color: red;
        }

        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 3px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-control.is-invalid {
            border-color: red !important;
        }

        .submit-btn {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        .radio-group {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h3 class="form-title">Student Registration Form</h3>

        <form id="registrationForm" action="submit.php" method="post">

        <!-- for the name input -->
        <div class="form-group">
            <label for="name" class="form-label required">Your Good Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
        </div>

        <!-- for email -->
        <div class="form-group">
            <label for="email" class="form-label required">Your Email</label>
            <input type="text" class="form-control" id="email" name="email" placeholder="Enter your email">
        </div>

        <!-- gender -->
        <div class="form-group radio-group">
            <label class="form-label required">Gender</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="male" value="Male">
                <label class="form-check-label" for="male">
                    Male
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                <label class="form-check-label" for="female">
                    Female
                </label>
            </div>
        </div>

        <!-- for website URL -->
        <div class="form-group">
            <label for="website" class="form-label">(Optional) Your vanity URL</label>
            <input type="text" class="form-control" id="website" name="website"
                placeholder="https://example.com/users/yourprofile">
        </div>

        <!-- for comment -->
        <div class="form-group">
            <label for="aboutyou" class="form-label">(Optional) Tell about you</label>
            <textarea class="form-control" id="aboutyou" name="aboutyou" rows="4"
                placeholder="Write something about yourself..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs | Update</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <h1>Update Blog</h1>

    <a href="index.html">Back to Home</a><br><br>

    <form action="../update.php" method="POST">
        <label for="id">Blog ID:</label>
        <input type="number" id="id" name="id" required><br><br>

        <label>Update Title:</label>
        <input type="radio" name="title_option" value="update" id="title_update"> Update
        <input type="radio" name="title_option" value="keep" id="title_keep" checked> Keep as it<br>
        <label for="title">New Title:</label>
        <input type="text" id="title" name="title"><br><br>

        <label>Update Content:</label>
        <input type="radio" name="content_option" value="update" id="content_update"> Update
        <input type="radio" name="content_option" value="keep" id="content_keep" checked> Keep as it<br>
        <label for="content">New Content:</label>
        <textarea id="content" name="content" rows="5" cols="50"></textarea><br><br>

        <button type="submit">Update Blog</button>
    </form>
</body>

</html>
